# =============================================================================
# Conductor Settings
# =============================================================================
# This file contains non-secret configuration for the Conducator backend.
# Copy this file to the project root before running the server.
# Secrets go in conductor.secrets.yaml (never committed).

server:
  host: "0.0.0.0"
  port: 8000
  debug: false
  reload: false
  log_level: "info"
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "vscode-webview://*"

database:
  pool_size: 10
  max_overflow: 20
  pool_timeout: 30
  echo_sql: false

auth:
  token_expire_minutes: 60
  refresh_expire_days: 7
  require_email_verify: false

rooms:
  max_participants: 50
  max_rooms_per_user: 10
  session_timeout_minutes: 120
  enable_persistence: true

live_share:
  enabled: false                  # Disabled — replaced by git_workspace
  vscode_extension_id: "ms-vsliveshare.vsliveshare"
  host_timeout_seconds: 300

# =============================================================================
# Git Workspace Settings
# =============================================================================
git_workspace:
  enabled: true
  workspaces_dir: "./workspaces"          # Local directory for git worktrees
  git_auth_mode: "token"                   # "token" (Mode A) or "delegate" (Mode B)
  credential_ttl_seconds: 3600             # Auto-expire credentials after 1 hour
  max_worktrees_per_repo: 20               # Safety cap on concurrent worktrees
  cleanup_on_room_close: true              # Remove worktree dir when room ends

# =============================================================================
# Code Search Settings
# =============================================================================
# Embedding backend options:
#   "local"   — SentenceTransformers, free, no API key needed
#   "bedrock" — AWS Bedrock (default: Cohere Embed v4, $0.12/1M tokens)
#   "openai"  — OpenAI Embeddings API
#   "voyage"  — Voyage AI (code-specialised, voyage-code-3)
#   "mistral" — Mistral Embeddings (Codestral Embed)
#
# Default is "bedrock" with Cohere Embed v4. To switch providers, change
# embedding_backend and ensure credentials are in conductor.secrets.yaml.
code_search:
  enabled: true
  index_dir: "./cocoindex_data"            # Where sqlite-vec databases are stored
  embedding_backend: "bedrock"             # "local" | "bedrock" | "openai" | "voyage" | "mistral"

  # -- Local (SentenceTransformers) --
  local_model_name: "all-MiniLM-L6-v2"    # Free, 384-d, ~80 MB on disk

  # -- AWS Bedrock --
  bedrock_model_id: "cohere.embed-v4:0"    # Cohere Embed v4 (1024-d, 128K ctx, $0.12/1M)
  bedrock_region: "us-east-1"              # Also supports: amazon.titan-embed-text-v2:0

  # -- OpenAI --
  openai_model_name: "text-embedding-3-small"  # 1536-d, $0.02/1M tokens

  # -- Voyage AI --
  voyage_model_name: "voyage-code-3"       # Code-specialised, 1024-d, $0.06/1M tokens

  # -- Mistral --
  mistral_model_name: "codestral-embed-2505"  # Code embedding, 1024-d

  # -- Chunking / Search --
  chunk_size: 512                          # Max tokens per AST chunk
  top_k_results: 5                         # Default number of search results

  # -- RepoMap (graph-based context) --
  repo_map_enabled: true                   # Enable tree-sitter + PageRank repo map
  repo_map_top_n: 10                       # Top N files to include in context map
