# Conductor Data Tier — Postgres + Redis
# ========================================
# Postgres hosts two databases:
#   - conductor  (backend OLTP data)
#   - langfuse   (Langfuse observability)
#
# Can be replaced with AWS RDS + ElastiCache in production.
#
# Usage:
#   docker compose -f docker/docker-compose.data.yaml up -d
#   make data-up

services:
  postgres:
    image: postgres:16-alpine
    container_name: conductor-postgres
    restart: unless-stopped
    env_file: .env
    networks:
      - conductor
    volumes:
      - conductor-pg-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conductor -d conductor"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: conductor-redis
    restart: unless-stopped
    networks:
      - conductor
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - conductor-redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  conductor:
    name: conductor-net

volumes:
  conductor-pg-data:
  conductor-redis-data:
