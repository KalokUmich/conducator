# Langfuse Self-Hosted Stack for Conductor
# ==========================================
# Requires data tier to be running first:
#   make data-up
#
# Langfuse connects to the shared Postgres in the data tier
# (database: langfuse, created by docker/init-db.sql).
#
# Usage:
#   docker compose -f docker/docker-compose.langfuse.yaml up -d
#   make langfuse-up
#   make langfuse-down
#   make langfuse-logs

services:
  langfuse:
    image: langfuse/langfuse:2
    container_name: conductor-langfuse
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@conductor-postgres:5432/langfuse
      NEXTAUTH_SECRET: conductor-langfuse-dev-secret
      NEXTAUTH_URL: http://localhost:3001
      SALT: conductor-langfuse-dev-salt
      TELEMETRY_ENABLED: "false"
      HOSTNAME: "0.0.0.0"
    ports:
      - "3001:3000"
    networks:
      - conductor
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/public/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  conductor:
    external: true
    name: conductor-net
