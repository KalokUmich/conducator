- id: greptile-keycloak-003
  patch: patches/003.patch
  difficulty: hard
  title: Add AuthzClientCryptoProvider for authorization client cryptographic operations
  description: "Test 3\n\nPlanted bugs (per greptile-apps[bot] review):\n  - [authz/client/src/main/java/org/keycloak/authorization/client/util/crypto/ASN1Decoder.java:153]\
    \ logic: bit shifting could cause integer overflow for large length values, consider using Math.addExact() or similar\
    \ overflow checking\n  - [common/src/main/java/org/keycloak/common/crypto/CryptoProvider.java:44] logic: method lacks\
    \ `default` implementation which will break existing CryptoProvider implementations that don't override this method\n\n\
    ```suggestion\n    default int order() {\n        return 0;\n    }\n`\n  - [authz/client/src/main/java/org/keycloak/authorization/client/util/crypto/AuthzClientCryptoProvider.java:67]\
    \ logic: incorrect provider returned - this returns the default keystore provider instead of BouncyCastle provider, which\
    \ will break cryptographic operations expecting BC functionality"
  source_dir: repos/greptile_bases/keycloak/003
  base_sha: 10aca5552314d6e5c9226f3c6d0107861c38c693
  base_ref: feature-authz-crypto-baseline
  head_ref: feature-authz-crypto-implementation
  expected_findings:
  - title_pattern: Math
    file_pattern: authz/client/src/main/java/org/keycloak/authorization/client/util/crypto/ASN1Decoder\.java
    line_range:
    - 148
    - 158
    severity: warning
    category: correctness
    recommendation: bit shifting could cause integer overflow for large length values, consider using Math.addExact() or similar
      overflow checking
  - title_pattern: CryptoProvider
    file_pattern: common/src/main/java/org/keycloak/common/crypto/CryptoProvider\.java
    line_range:
    - 39
    - 49
    severity: critical
    category: correctness
    recommendation: "method lacks `default` implementation which will break existing CryptoProvider implementations that don't\
      \ override this method\n\n```suggestion\n    default int order() {\n        return 0;\n    }\n```"
  - title_pattern: BouncyCastle
    file_pattern: authz/client/src/main/java/org/keycloak/authorization/client/util/crypto/AuthzClientCryptoProvider\.java
    line_range:
    - 62
    - 72
    severity: critical
    category: correctness
    recommendation: incorrect provider returned - this returns the default keystore provider instead of BouncyCastle provider,
      which will break cryptographic operations expecting BC functionality
  - title_pattern: Trailing
    file_pattern: common/src/main/java/org/keycloak/common/crypto/CryptoIntegration\.java
    line_range:
    - 62
    - 72
    severity: warning
    category: correctness
    recommendation: Trailing comma will be added to the logged string for all ignored providers
