cases:
- id: greptile-grafana-001
  patch: patches/001.patch
  difficulty: hard
  title: 'Anonymous: Add configurable device limit'
  description: "Test 1\n\nPlanted bugs (per greptile-apps[bot] review):\n  - [pkg/services/anonymous/anonimpl/anonstore/database.go:118]\
    \ logic: Race condition: Multiple concurrent requests could pass the device count check simultaneously and create devices\
    \ beyond the limit. Consider using a database transaction or lock.\n  - [pkg/services/anonymous/anonimpl/anonstore/database.go:82]\
    \ logic: Time window calculation inconsistency: Using `device.UpdatedAt.UTC().Add(-anonymousDeviceExpiration)` as the\
    \ lower bound but device.UpdatedAt as the current time may not match the intended logi\n  - [pkg/services/anonymous/anonimpl/anonstore/database.go:97]\
    \ logic: Misleading error: Returning `ErrDeviceLimitReached` when no rows are affected in updateDevice is confusing since\
    \ the device might not exist rather than limit being reached."
  source_dir: repos/greptile_bases/grafana/001
  base_sha: ed865831071a0c0a63c75ad0cfa6661107dabcaf
  base_ref: enhance-anonymous-access
  head_ref: implement-device-limits
  expected_findings:
  - title_pattern: Race|Multiple|Consider
    file_pattern: pkg/services/anonymous/anonimpl/anonstore/database\.go
    line_range:
    - 113
    - 123
    severity: critical
    category: concurrency
    recommendation: 'Race condition: Multiple concurrent requests could pass the device count check simultaneously and create
      devices beyond the limit.'
  - title_pattern: Time|Using|UpdatedAt|Consider
    file_pattern: pkg/services/anonymous/anonimpl/anonstore/database\.go
    line_range:
    - 77
    - 87
    severity: warning
    category: correctness
    recommendation: 'Time window calculation inconsistency: Using `device.UpdatedAt.UTC().Add(-anonymousDeviceExpiration)`
      as the lower bound but device.UpdatedAt as the current time may not match the intended logic.'
  - title_pattern: Misleading|Returning|ErrDeviceLimitReached
    file_pattern: pkg/services/anonymous/anonimpl/anonstore/database\.go
    line_range:
    - 92
    - 102
    severity: critical
    category: correctness
    recommendation: 'Misleading error: Returning `ErrDeviceLimitReached` when no rows are affected in updateDevice is confusing
      since the device might not exist rather than limit being reached.'
  - title_pattern: Inconsistent|Minute|UpdatedAt|This
    file_pattern: pkg/services/anonymous/anonimpl/anonstore/database\.go
    line_range:
    - 105
    - 115
    severity: warning
    category: correctness
    recommendation: 'Inconsistent time windows: The count query uses `time.Now().UTC().Add(time.Minute)` as upper bound, but
      updateDevice uses `device.UpdatedAt.UTC().Add(time.Minute)`.'
  - title_pattern: Test|ClientIP|UserAgent
    file_pattern: pkg/services/anonymous/anonimpl/anonstore/database_test\.go
    line_range:
    - 63
    - 73
    severity: warning
    category: correctness
    recommendation: 'Test may not accurately validate device limit: both devices use the same ClientIP and UserAgent.'
