- id: greptile-discourse-003
  patch: patches/003.patch
  difficulty: medium
  title: Add comprehensive email validation for blocked users
  description: "Test 3\n\nPlanted bugs (per greptile-apps[bot] review):\n  - [spec/models/blocked_email_spec.rb:30] logic:\
    \ Custom matcher `be_within_one_second_of` is not defined. Need to implement this matcher or use built-in alternatives\
    \ like `be_within(1.second).of(Time.zone.now)`\n\n```suggestion\n          expect\n  - [lib/validators/email_validator.rb:22]\
    \ logic: ReDoS vulnerability: `setting` input is passed directly to regex construction without sanitization. Malicious\
    \ settings could cause catastrophic backtracking.\n  - [lib/validators/email_validator.rb:8] logic: Using `elsif` prevents\
    \ both whitelist and blacklist from being applied simultaneously - this may not be the intended behavior for security\
    \ restrictions."
  source_dir: repos/greptile_bases/discourse/003
  base_sha: e25638dab0d4b98f99c8fe8976ccaae8f4fb9db3
  base_ref: blocked-email-validation-pre
  head_ref: blocked-email-validation-post
  expected_findings:
  - title_pattern: Custom|be_within_one_second_of|Need|Time
    file_pattern: spec/models/blocked_email_spec\.rb
    line_range:
    - 25
    - 35
    severity: warning
    category: concurrency
    recommendation: Custom matcher `be_within_one_second_of` is not defined.
  - title_pattern: ReDoS|Malicious
    file_pattern: lib/validators/email_validator\.rb
    line_range:
    - 17
    - 27
    severity: warning
    category: correctness
    recommendation: 'ReDoS vulnerability: `setting` input is passed directly to regex construction without sanitization.'
  - title_pattern: Using
    file_pattern: lib/validators/email_validator\.rb
    line_range:
    - 3
    - 13
    severity: warning
    category: correctness
    recommendation: Using `elsif` prevents both whitelist and blacklist from being applied simultaneously - this may not be
      the intended behavior for security restrictions.
  - title_pattern: Regex|Regexp
    file_pattern: lib/validators/email_validator\.rb
    line_range:
    - 15
    - 25
    severity: warning
    category: correctness
    recommendation: Regex pattern `@(#{domains})` only matches domain suffixes, not full domains.
  - title_pattern: This
    file_pattern: app/models/blocked_email\.rb
    line_range:
    - 14
    - 24
    severity: warning
    category: concurrency
    recommendation: This method has side effects during a read operation - it updates statistics even when just checking if
      an email should be blocked.
  - title_pattern: The|increment|and|save|operations
    file_pattern: app/models/blocked_email\.rb
    line_range:
    - 11
    - 21
    severity: warning
    category: concurrency
    recommendation: The increment and save operations should use `increment!` or be wrapped in a transaction to prevent race
      conditions when multiple requests check the same email simultaneously.
